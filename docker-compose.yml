services:
  mysql:
    image: mysql:8.0
    container_name: duanshipin-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-duanshipin}
      MYSQL_USER: ${MYSQL_USER:-duanshipin}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - duanshipin-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: duanshipin-backend
    restart: always
    init: true
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=mysql://${MYSQL_USER:-duanshipin}:${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}@mysql:3306/${MYSQL_DATABASE:-duanshipin}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      - JWT_EXPIRES_IN=7d
      - INIT_DEFAULT_CATEGORIES=false
    volumes:
      - ./backend/logs:/app/logs
    ports:
      - "${BACKEND_BIND_HOST:-127.0.0.1}:${BACKEND_PORT:-4000}:4000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - duanshipin-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: duanshipin-frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-4001}:4001"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - duanshipin-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4001/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  duanshipin-network:
    driver: bridge

volumes:
  mysql_data:








