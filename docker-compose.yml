services:
  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: duanshipin-backend
    restart: always
    network_mode: host
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=mysql://duanshipin:KEpYWdYx3TXDhrk3@127.0.0.1:3306/duanshipin
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=7d
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-3.5-turbo}
      - INIT_DEFAULT_CATEGORIES=false
    volumes:
      - ./backend/logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: duanshipin-frontend
    restart: always
    ports:
      - "4001:4001"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - duanshipin-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4001/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  duanshipin-network:
    driver: bridge


